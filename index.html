<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: #3f3f3f;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
            text-align: center;
            padding: 30px 20px 20px 20px;
            transition: transform 0.3s ease;
            color: #333;
            
        }

        .profile-card .name {
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .profile-card .stream {
            color: #eee;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .profile-card .bio {
            color: #fff;
            
            padding: 10px 10px 10px 0px;
            
            border-radius: 8px;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .profile-image {
            width: 100px;
            height: 100px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-image svg {
            width: 50px;
            fill: #999;
        }

        .name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin: 10px 0 5px;
        }

        .stream {
            font-size: 1rem;
            color: #007bff;
            font-weight: 500;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .bio {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
            margin-bottom: 0px;
            padding-bottom: 0px;
        }

        .contact-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }

        .contact-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-image">
            <!-- SVG Placeholder for Image -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <!-- Replace SVG with an img tag if you have a real URL -->
            <!-- <img src="https://via.placeholder.com/100" alt="Profile Picture"> -->
        </div>
        <div class="name">John Doe</div>
        <div class="stream">Computer Science</div>
        <p class="bio">
            Passionate software engineering student with an interest in AI and web technologies. Always looking for new challenges and opportunities to learn.
        </p>
       
    </div>

</body>
</html>
